<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Money — UK Political Donations 2022-2026</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #1C1C2D;
  --node-fill: #FFFFFF;
  --node-border: #2B7BCE;
  --text-dark: #000000;
  --text-blue: #2B7BCE;
  --line-color: rgba(255,255,255,0.5);
  --text-light: #e2e8f0;
  --text-muted: #94a3b8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text-light); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; overflow-x:auto; }

/* Header */
.header { padding:24px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
.header h1 { font-size:1.5rem; font-weight:700; }
.header h1 span { color:var(--node-border); }
.source { color:var(--text-muted); font-size:0.75rem; }
.source a { color:var(--node-border); text-decoration:none; }

/* Party selector */
.party-selector { display:flex; gap:8px; padding:0 32px 24px; flex-wrap:wrap; }
.party-btn { background:rgba(255,255,255,0.08); border:2px solid transparent; border-radius:8px; color:var(--text-light); padding:8px 16px; cursor:pointer; font-size:0.85rem; font-weight:500; transition:all 0.2s; }
.party-btn:hover { background:rgba(255,255,255,0.15); }
.party-btn.active { border-color:var(--node-border); background:rgba(43,123,206,0.15); }

/* Tree container */
#tree-container { width:100%; overflow-x:auto; padding:0 16px 40px; }
#tree-svg { display:block; margin:0 auto; }

/* Nodes */
.node rect { fill:var(--node-fill); stroke:var(--node-border); stroke-width:2px; rx:10; ry:10; cursor:pointer; transition:filter 0.2s; }
.node rect:hover { filter:drop-shadow(0 0 8px rgba(43,123,206,0.4)); }
.node .label { fill:var(--text-dark); font-size:12px; font-weight:600; text-anchor:middle; pointer-events:none; }
.node .value { fill:var(--text-blue); font-size:11px; font-weight:500; text-anchor:middle; pointer-events:none; }
.node .pct { fill:var(--text-blue); font-size:10px; font-weight:400; text-anchor:middle; pointer-events:none; opacity:0.7; }

/* Root node special */
.node.root rect { fill:var(--node-fill); stroke:var(--node-border); stroke-width:3px; }
.node.root .label { font-size:14px; font-weight:700; }
.node.root .value { font-size:13px; font-weight:600; }

/* Links */
.link { fill:none; stroke:var(--line-color); stroke-width:1.5px; }

/* Footer */
.footer { text-align:center; padding:32px; color:var(--text-muted); font-size:0.75rem; }
.footer a { color:var(--node-border); text-decoration:none; }

/* Mobile */
@media (max-width:768px) {
  .header { padding:16px; }
  .party-selector { padding:0 16px 16px; }
  .party-btn { padding:6px 12px; font-size:0.8rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>💰 Party <span>Money</span></h1>
  <div class="source">Data: <a href="https://search.electoralcommission.org.uk/" target="_blank">The Electoral Commission</a> · 2022–2026</div>
</div>

<div class="party-selector" id="partySelector"></div>
<div id="tree-container">
  <svg id="tree-svg"></svg>
</div>

<div class="footer">
  <a href="https://github.com/jhammant/party-money" target="_blank">Source on GitHub</a> · 
  Data from the Electoral Commission's public register of donations · 
  All figures in GBP
</div>

<script>
const PARTY_COLORS = {
  'Conservative and Unionist Party': '#0087DC',
  'Labour Party': '#DC241F',
  'Reform UK': '#12B6CF',
  'Liberal Democrats': '#FAA61A',
  'Scottish National Party (SNP)': '#FFF95D',
  'Green Party': '#6AB023',
  'Co-operative Party': '#3F1D70',
  'Sinn Féin': '#326760',
  'Democratic Unionist Party - D.U.P.': '#D46A4C',
  'The Reclaim Party': '#C41E3A',
  'SDLP (Social Democratic & Labour Party)': '#2AA82C',
  'Plaid Cymru - The Party of Wales': '#005B54',
};

const SHORT_NAMES = {
  'Conservative and Unionist Party': 'Conservative',
  'Labour Party': 'Labour',
  'Reform UK': 'Reform UK',
  'Liberal Democrats': 'Lib Dems',
  'Scottish National Party (SNP)': 'SNP',
  'Green Party': 'Green',
  'Co-operative Party': 'Co-op',
  'Sinn Féin': 'Sinn Féin',
  'Democratic Unionist Party - D.U.P.': 'DUP',
  'The Reclaim Party': 'Reclaim',
  'SDLP (Social Democratic & Labour Party)': 'SDLP',
  'Plaid Cymru - The Party of Wales': 'Plaid Cymru',
};

function fmtGBP(v) {
  if (v >= 1e6) return '£' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '£' + (v/1e3).toFixed(0) + 'k';
  return '£' + v.toFixed(0);
}
function fmtFull(v) {
  return '£' + v.toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function truncate(s, max) {
  return s.length > max ? s.substring(0, max-1) + '…' : s;
}

let DATA = null;
let currentParty = null;

async function init() {
  const resp = await fetch('tree-data.json');
  DATA = await resp.json();
  
  const selector = document.getElementById('partySelector');
  const parties = Object.keys(DATA).sort((a,b) => DATA[b].total - DATA[a].total);
  
  parties.forEach(party => {
    const btn = document.createElement('button');
    btn.className = 'party-btn';
    btn.textContent = SHORT_NAMES[party] || party;
    btn.style.borderColor = 'transparent';
    btn.onclick = () => selectParty(party);
    btn.dataset.party = party;
    selector.appendChild(btn);
  });
  
  selectParty(parties[0]);
}

function selectParty(party) {
  currentParty = party;
  document.querySelectorAll('.party-btn').forEach(b => {
    const isActive = b.dataset.party === party;
    b.classList.toggle('active', isActive);
    if (isActive) {
      b.style.borderColor = PARTY_COLORS[party] || '#2B7BCE';
      b.style.background = (PARTY_COLORS[party] || '#2B7BCE') + '25';
    } else {
      b.style.borderColor = 'transparent';
      b.style.background = 'rgba(255,255,255,0.08)';
    }
  });
  renderTree(party);
}

function buildTreeData(party) {
  const d = DATA[party];
  const partyColor = PARTY_COLORS[party] || '#2B7BCE';
  
  const children = d.types.map(t => {
    const typeChildren = t.donors.map(donor => ({
      name: truncate(donor.name, 28),
      fullName: donor.name,
      value: donor.value,
      pct: ((donor.value / d.total) * 100),
    }));
    
    return {
      name: t.type,
      value: t.total,
      pct: ((t.total / d.total) * 100),
      children: typeChildren,
    };
  });
  
  return {
    name: SHORT_NAMES[party] || party,
    fullName: party,
    value: d.total,
    count: d.count,
    isRoot: true,
    children: children,
  };
}

function renderTree(party) {
  const svg = d3.select('#tree-svg');
  svg.selectAll('*').remove();
  
  const treeData = buildTreeData(party);
  const partyColor = PARTY_COLORS[party] || '#2B7BCE';
  
  const root = d3.hierarchy(treeData);
  
  // Count leaf nodes for width calculation
  const leaves = root.leaves().length;
  const nodeW = 160, nodeH = 55;
  const hGap = 20, vGap = 80;
  
  const treeWidth = Math.max(800, leaves * (nodeW + hGap));
  const treeHeight = (root.height + 1) * (nodeH + vGap) + 80;
  
  const treeLayout = d3.tree()
    .size([treeWidth - 80, treeHeight - 120])
    .separation((a, b) => {
      return a.parent === b.parent ? 1 : 1.2;
    });
  
  treeLayout(root);
  
  const totalW = treeWidth;
  const totalH = treeHeight;
  
  svg.attr('width', totalW).attr('height', totalH);
  
  const g = svg.append('g').attr('transform', `translate(40, 50)`);
  
  // Orthogonal links
  g.selectAll('.link')
    .data(root.links())
    .join('path')
    .attr('class', 'link')
    .attr('d', d => {
      const sx = d.source.x, sy = d.source.y + nodeH/2;
      const tx = d.target.x, ty = d.target.y - nodeH/2;
      const midY = (sy + ty) / 2;
      return `M${sx},${sy} V${midY} H${tx} V${ty}`;
    });
  
  // Nodes
  const node = g.selectAll('.node')
    .data(root.descendants())
    .join('g')
    .attr('class', d => 'node' + (d.data.isRoot ? ' root' : ''))
    .attr('transform', d => `translate(${d.x - nodeW/2}, ${d.y - nodeH/2})`);
  
  // Node rectangles
  node.append('rect')
    .attr('width', nodeW)
    .attr('height', nodeH)
    .attr('rx', 10)
    .attr('ry', 10)
    .attr('stroke', d => d.data.isRoot ? partyColor : '#2B7BCE');
  
  // Root node gets party color border
  node.filter(d => d.data.isRoot)
    .select('rect')
    .attr('stroke', partyColor)
    .attr('stroke-width', 3);
  
  // Labels
  node.append('text')
    .attr('class', 'label')
    .attr('x', nodeW/2)
    .attr('y', d => d.data.pct !== undefined && !d.data.isRoot ? nodeH/2 - 8 : nodeH/2 - 4)
    .text(d => truncate(d.data.name, 22));
  
  // Values
  node.append('text')
    .attr('class', 'value')
    .attr('x', nodeW/2)
    .attr('y', d => d.data.pct !== undefined && !d.data.isRoot ? nodeH/2 + 8 : nodeH/2 + 12)
    .text(d => d.data.isRoot ? fmtFull(d.data.value) : fmtGBP(d.data.value));
  
  // Percentage
  node.filter(d => d.data.pct !== undefined && !d.data.isRoot)
    .append('text')
    .attr('class', 'pct')
    .attr('x', nodeW/2)
    .attr('y', nodeH/2 + 22)
    .text(d => d.data.pct >= 0.1 ? `(${d.data.pct.toFixed(1)}%)` : '(<0.1%)');
  
  // Root count
  node.filter(d => d.data.isRoot)
    .append('text')
    .attr('class', 'pct')
    .attr('x', nodeW/2)
    .attr('y', nodeH/2 + 24)
    .text(d => `${d.data.count.toLocaleString()} donations`);
}

init();
</script>
</body>
</html>
