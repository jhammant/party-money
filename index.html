<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Money — UK Political Donations 2022-2026</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #1C1C2D;
  --node-fill: #FFFFFF;
  --node-border: #2B7BCE;
  --text-dark: #000000;
  --text-blue: #2B7BCE;
  --line-color: rgba(255,255,255,0.5);
  --text-light: #e2e8f0;
  --text-muted: #94a3b8;
  --panel-bg: #232340;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text-light); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }

.header { padding:24px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
.header h1 { font-size:1.5rem; font-weight:700; }
.header h1 span { color:var(--node-border); }
.source { color:var(--text-muted); font-size:0.75rem; }
.source a { color:var(--node-border); text-decoration:none; }

.party-selector { display:flex; gap:8px; padding:0 32px 24px; flex-wrap:wrap; }
.party-btn { background:rgba(255,255,255,0.08); border:2px solid transparent; border-radius:8px; color:var(--text-light); padding:8px 16px; cursor:pointer; font-size:0.85rem; font-weight:500; transition:all 0.2s; }
.party-btn:hover { background:rgba(255,255,255,0.15); }
.party-btn.active { border-color:var(--node-border); background:rgba(43,123,206,0.15); }

.hint { text-align:center; color:var(--text-muted); font-size:0.8rem; margin-bottom:16px; }

#tree-container { width:100%; overflow-x:auto; padding:0 16px 40px; }
#tree-svg { display:block; margin:0 auto; }

.node rect { fill:var(--node-fill); stroke:var(--node-border); stroke-width:2px; rx:10; ry:10; cursor:pointer; transition:filter 0.2s; }
.node rect:hover { filter:drop-shadow(0 0 8px rgba(43,123,206,0.4)); }
.node .label { fill:var(--text-dark); font-size:12px; font-weight:600; text-anchor:middle; pointer-events:none; }
.node .value { fill:var(--text-blue); font-size:11px; font-weight:500; text-anchor:middle; pointer-events:none; }
.node .pct { fill:var(--text-blue); font-size:10px; font-weight:400; text-anchor:middle; pointer-events:none; opacity:0.7; }
.node .expand-hint { fill:var(--text-blue); font-size:10px; text-anchor:middle; pointer-events:none; opacity:0.6; }
.node.root rect { stroke-width:3px; }
.node.root .label { font-size:14px; font-weight:700; }
.node.root .value { font-size:13px; font-weight:600; }
.link { fill:none; stroke:var(--line-color); stroke-width:1.5px; }

/* Donor detail panel */
.donor-panel-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:100; display:none; }
.donor-panel-overlay.visible { display:flex; align-items:center; justify-content:center; }
.donor-panel { background:var(--panel-bg); border:2px solid var(--node-border); border-radius:16px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; padding:28px; position:relative; }
.donor-panel .close-btn { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--text-muted); font-size:1.5rem; cursor:pointer; line-height:1; }
.donor-panel .close-btn:hover { color:var(--text-light); }
.donor-panel h2 { font-size:1.2rem; font-weight:700; margin-bottom:4px; padding-right:30px; }
.donor-panel .donor-meta { color:var(--text-muted); font-size:0.8rem; margin-bottom:16px; }
.donor-panel .donor-total { font-size:1.4rem; font-weight:700; color:var(--node-border); margin-bottom:4px; }
.donor-panel .party-tag { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.75rem; font-weight:600; margin:2px 4px 2px 0; }
.donor-panel h3 { font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); margin:16px 0 8px; }
.donations-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
.donations-table th { text-align:left; color:var(--text-muted); font-weight:500; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.03em; padding:6px 8px; border-bottom:1px solid rgba(255,255,255,0.1); }
.donations-table td { padding:8px; border-bottom:1px solid rgba(255,255,255,0.05); }
.donations-table .amt { color:var(--node-border); font-weight:600; text-align:right; white-space:nowrap; }
.donations-table .date { color:var(--text-muted); white-space:nowrap; }

.footer { text-align:center; padding:32px; color:var(--text-muted); font-size:0.75rem; }
.footer a { color:var(--node-border); text-decoration:none; }

@media (max-width:768px) {
  .header { padding:16px; }
  .party-selector { padding:0 16px 16px; }
  .party-btn { padding:6px 10px; font-size:0.75rem; }
  .donor-panel { padding:20px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>💰 Party <span>Money</span></h1>
  <div class="source">Data: <a href="https://search.electoralcommission.org.uk/" target="_blank">The Electoral Commission</a> · 2022–2026</div>
</div>

<div class="party-selector" id="partySelector"></div>
<p class="hint">Click a category to expand · Click a donor name for full details</p>
<div id="tree-container">
  <svg id="tree-svg"></svg>
</div>

<div class="donor-panel-overlay" id="donorOverlay">
  <div class="donor-panel" id="donorPanel">
    <button class="close-btn" onclick="closePanel()">&times;</button>
    <div id="donorContent"></div>
  </div>
</div>

<div class="footer">
  <a href="https://github.com/jhammant/party-money" target="_blank">Source on GitHub</a> · 
  Electoral Commission public donation register · All figures GBP
</div>

<script>
const PARTY_COLORS = {
  'Conservative and Unionist Party': '#0087DC',
  'Labour Party': '#DC241F',
  'Reform UK': '#12B6CF',
  'Liberal Democrats': '#FAA61A',
  'Scottish National Party (SNP)': '#FFF95D',
  'Green Party': '#6AB023',
  'Co-operative Party': '#3F1D70',
  'Sinn Féin': '#326760',
  'Democratic Unionist Party - D.U.P.': '#D46A4C',
  'The Reclaim Party': '#C41E3A',
  'SDLP (Social Democratic & Labour Party)': '#2AA82C',
  'Plaid Cymru - The Party of Wales': '#005B54',
};
const SHORT_NAMES = {
  'Conservative and Unionist Party': 'Conservative',
  'Labour Party': 'Labour',
  'Reform UK': 'Reform UK',
  'Liberal Democrats': 'Lib Dems',
  'Scottish National Party (SNP)': 'SNP',
  'Green Party': 'Green',
  'Co-operative Party': 'Co-op',
  'Sinn Féin': 'Sinn Féin',
  'Democratic Unionist Party - D.U.P.': 'DUP',
  'The Reclaim Party': 'Reclaim',
  'SDLP (Social Democratic & Labour Party)': 'SDLP',
  'Plaid Cymru - The Party of Wales': 'Plaid Cymru',
};

function fmtGBP(v) {
  if (v >= 1e6) return '£' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '£' + (v/1e3).toFixed(0) + 'k';
  return '£' + v.toFixed(0);
}
function fmtFull(v) {
  return '£' + v.toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function truncate(s, max) {
  return s.length > max ? s.substring(0, max-1) + '…' : s;
}

let DATA = null, DONORS = null, currentParty = null;
let expandedTypes = new Set();

async function init() {
  const raw = await (await fetch('tree-data.json')).json();
  DATA = raw.parties;
  DONORS = raw.donors;
  
  const selector = document.getElementById('partySelector');
  const parties = Object.keys(DATA).sort((a,b) => DATA[b].total - DATA[a].total);
  
  parties.forEach(party => {
    const btn = document.createElement('button');
    btn.className = 'party-btn';
    btn.textContent = SHORT_NAMES[party] || party;
    btn.onclick = () => selectParty(party);
    btn.dataset.party = party;
    selector.appendChild(btn);
  });
  
  selectParty(parties[0]);
}

function selectParty(party) {
  currentParty = party;
  expandedTypes.clear();
  document.querySelectorAll('.party-btn').forEach(b => {
    const isActive = b.dataset.party === party;
    b.classList.toggle('active', isActive);
    b.style.borderColor = isActive ? (PARTY_COLORS[party] || '#2B7BCE') : 'transparent';
    b.style.background = isActive ? (PARTY_COLORS[party] || '#2B7BCE') + '25' : 'rgba(255,255,255,0.08)';
  });
  renderTree();
}

function toggleType(typeName) {
  if (expandedTypes.has(typeName)) expandedTypes.delete(typeName);
  else expandedTypes.add(typeName);
  renderTree();
}

function showDonorPanel(donorName) {
  const d = DONORS[donorName];
  if (!d) return;
  const content = document.getElementById('donorContent');
  
  let partyTags = d.parties.map(p => {
    const color = PARTY_COLORS[p] || '#888';
    return `<span class="party-tag" style="background:${color}22;color:${color};border:1px solid ${color}44">${SHORT_NAMES[p]||p}</span>`;
  }).join('');
  
  let meta = [d.status, d.postcode, d.companyNum ? `Co. #${d.companyNum}` : ''].filter(Boolean).join(' · ');
  
  let rows = d.donations.map(don => {
    const pc = PARTY_COLORS[don.party] || '#888';
    return `<tr><td class="date">${don.date}</td><td style="color:${pc}">${SHORT_NAMES[don.party]||don.party}</td><td style="color:var(--text-muted);font-size:0.8rem">${don.type}${don.nature?' · '+don.nature:''}</td><td class="amt">${fmtFull(don.value)}</td></tr>`;
  }).join('');
  
  content.innerHTML = `<h2>${donorName}</h2><div class="donor-meta">${meta}</div><div class="donor-total">${fmtFull(d.total)}</div><div class="donor-meta">${d.count} donation${d.count!==1?'s':''} across ${d.parties.length} part${d.parties.length!==1?'ies':'y'}</div><div style="margin-bottom:16px">${partyTags}</div><h3>All Donations</h3><table class="donations-table"><thead><tr><th>Date</th><th>Party</th><th>Type</th><th style="text-align:right">Amount</th></tr></thead><tbody>${rows}</tbody></table>`;
  
  document.getElementById('donorOverlay').classList.add('visible');
}

function closePanel() {
  document.getElementById('donorOverlay').classList.remove('visible');
}
document.getElementById('donorOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closePanel(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

function renderTree() {
  const party = currentParty;
  const d = DATA[party];
  const partyColor = PARTY_COLORS[party] || '#2B7BCE';
  const svg = d3.select('#tree-svg');
  svg.selectAll('*').remove();
  
  const nodeW = 155, nodeH = 56;
  const vGap = 70;
  const hGapType = 12;
  const hGapDonor = 8;
  
  // Build layout manually for better control
  const types = d.types;
  const typeCount = types.length;
  
  // Calculate how many columns we need at the donor level for expanded types
  let totalDonorCols = 0;
  let typeColSpans = [];
  types.forEach(t => {
    const expanded = expandedTypes.has(t.type);
    const cols = expanded ? Math.max(t.donors.length, 1) : 1;
    typeColSpans.push(cols);
    totalDonorCols += cols;
  });
  
  const maxCols = Math.max(typeCount, totalDonorCols);
  const totalW = maxCols * (nodeW + hGapType) + 60;
  
  // Determine levels
  const hasExpanded = expandedTypes.size > 0;
  const levels = hasExpanded ? 3 : 2;
  const totalH = levels * (nodeH + vGap) + 60;
  
  svg.attr('width', Math.max(totalW, 600)).attr('height', totalH);
  const g = svg.append('g').attr('transform', 'translate(30, 30)');
  
  // Root position
  const rootX = (totalW - 60) / 2;
  const rootY = 0;
  
  // Type positions — spread evenly, but respect expanded widths
  let typePositions = [];
  let cursor = 0;
  types.forEach((t, i) => {
    const span = typeColSpans[i];
    const centerCol = cursor + span / 2;
    typePositions.push(centerCol);
    cursor += span;
  });
  
  // Normalize to pixel positions
  const colW = (totalW - 60) / totalDonorCols;
  const typeY = nodeH + vGap;
  
  // Draw root
  drawNode(g, rootX, rootY, {
    label: SHORT_NAMES[party] || party,
    value: fmtFull(d.total),
    sub: d.count.toLocaleString() + ' donations',
    isRoot: true,
    borderColor: partyColor,
  }, nodeW + 20, nodeH);
  
  // Draw types and connections
  types.forEach((t, i) => {
    const tx = typePositions[i] * colW;
    const expanded = expandedTypes.has(t.type);
    const pctStr = ((t.total / d.total) * 100).toFixed(1) + '%';
    
    // Line from root to type
    drawOrthLink(g, rootX, rootY + nodeH, tx, typeY);
    
    // Type node
    const typeG = drawNode(g, tx, typeY, {
      label: t.type,
      value: fmtGBP(t.total),
      sub: pctStr,
      expandHint: expanded ? '▲' : '▼ ' + t.donors.length,
    }, nodeW, nodeH);
    
    typeG.style('cursor', 'pointer').on('click', () => toggleType(t.type));
    
    // Draw donors if expanded
    if (expanded) {
      const donorY = typeY + nodeH + vGap;
      const donorCount = t.donors.length;
      // Find the starting column for this type's donors
      let startCol = 0;
      for (let j = 0; j < i; j++) startCol += typeColSpans[j];
      
      t.donors.forEach((donor, di) => {
        const dx = (startCol + di + 0.5) * colW;
        const donorPct = ((donor.value / d.total) * 100);
        const pctLabel = donorPct >= 0.1 ? donorPct.toFixed(1) + '%' : '<0.1%';
        
        drawOrthLink(g, tx, typeY + nodeH, dx, donorY);
        
        const isClickable = !donor.isGroup && DONORS && DONORS[donor.name];
        const donorG = drawNode(g, dx, donorY, {
          label: truncate(donor.name, 20),
          value: fmtGBP(donor.value),
          sub: pctLabel,
          info: isClickable,
        }, nodeW, nodeH);
        
        if (isClickable) {
          donorG.style('cursor', 'pointer').on('click', () => showDonorPanel(donor.name));
        }
      });
    }
  });
}

function drawNode(parent, cx, y, opts, w, h) {
  const ng = parent.append('g')
    .attr('class', 'node' + (opts.isRoot ? ' root' : ''))
    .attr('transform', `translate(${cx - w/2}, ${y})`);
  
  ng.append('rect')
    .attr('width', w).attr('height', h)
    .attr('rx', 10).attr('ry', 10)
    .attr('stroke', opts.borderColor || '#2B7BCE')
    .attr('stroke-width', opts.isRoot ? 3 : 2);
  
  const hasThreeLines = opts.sub && opts.expandHint;
  const line1Y = hasThreeLines ? h/2 - 12 : (opts.sub ? h/2 - 8 : h/2 - 2);
  const line2Y = hasThreeLines ? h/2 + 2 : h/2 + 8;
  
  ng.append('text').attr('class', 'label')
    .attr('x', w/2).attr('y', line1Y)
    .text(opts.label);
  
  ng.append('text').attr('class', 'value')
    .attr('x', w/2).attr('y', line2Y)
    .text(opts.value);
  
  if (opts.sub) {
    ng.append('text').attr('class', 'pct')
      .attr('x', w/2).attr('y', hasThreeLines ? h/2 + 14 : h/2 + 20)
      .text(opts.sub);
  }
  
  if (opts.expandHint) {
    ng.append('text').attr('class', 'expand-hint')
      .attr('x', w/2).attr('y', h/2 + 26)
      .text(opts.expandHint);
  }
  
  if (opts.info) {
    ng.append('text')
      .attr('x', w - 8).attr('y', 14)
      .attr('text-anchor', 'end')
      .attr('fill', '#2B7BCE').attr('font-size', '10px')
      .attr('opacity', 0.5).attr('pointer-events', 'none')
      .text('ⓘ');
  }
  
  return ng;
}

function drawOrthLink(parent, x1, y1, x2, y2) {
  const midY = (y1 + y2) / 2;
  parent.append('path')
    .attr('class', 'link')
    .attr('d', `M${x1},${y1} V${midY} H${x2} V${y2}`);
}

init();
</script>
</body>
</html>
